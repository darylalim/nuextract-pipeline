name: Release

# Auto-publishes a GitHub Release whenever a version tag (v*) is pushed.
# Workflow: bump `version` in pyproject.toml, commit, then
#   git tag vX.Y.Z && git push origin vX.Y.Z
# The tag (vX.Y.Z) must match `version` in pyproject.toml, or the job fails
# before creating the release (see the verify step below).
# The v1.2.0 release was created by hand (curated notes, no prior tag to diff
# against); every tag from here uses GitHub's auto-generated notes, which diff
# against the previous tag.

on:
  push:
    tags:
      - "v*"

# The default GITHUB_TOKEN needs write access to create a release.
permissions:
  contents: write

jobs:
  release:
    # Unlike ci.yml, this needs no Apple Silicon / MLX — it only calls the
    # GitHub API, so the cheaper, faster ubuntu runner is enough.
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history so --generate-notes can diff against the previous tag

      - name: Verify tag matches pyproject.toml version
        # Fail fast on tag/version drift: tag v1.3.0 must match version = "1.3.0".
        # python3 (with stdlib tomllib) is preinstalled on ubuntu-latest, so no
        # extra setup is needed. GITHUB_REF_NAME is the runner-provided tag name;
        # quoting it keeps the comparison injection-safe.
        run: |
          tag_version="${GITHUB_REF_NAME#v}"
          pyproject_version="$(python3 -c 'import tomllib; print(tomllib.load(open("pyproject.toml", "rb"))["project"]["version"])')"
          echo "tag=${tag_version}  pyproject=${pyproject_version}"
          if [ "${tag_version}" != "${pyproject_version}" ]; then
            echo "::error::Tag v${tag_version} does not match pyproject.toml version ${pyproject_version}. Bump the version (or re-tag) so they agree, then push the tag again."
            exit 1
          fi

      - name: Create GitHub Release with auto-generated notes
        env:
          GH_TOKEN: ${{ github.token }}
        run: >
          gh release create "${GITHUB_REF_NAME}"
          --title "${GITHUB_REF_NAME}"
          --generate-notes
          --verify-tag
          --latest
